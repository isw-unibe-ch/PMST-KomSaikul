site_name: "PMST-KomSaikul: Person Marking in Saikul Kom (South-Central Trans-Himalayan)"
docs_dir: docs
theme:
  palette:
    primary: pink
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
plugins:
  - paralex:
      paralex_package_path: "pmst-komsaikul.package.json"
      layout_tables:
        - tense_aspect
      layout_rows:
        - person
        - number
        - clusivity
      layout_columns:
        - polarity
extra_javascript:
  - column-filters.js
repo_url: https://github.com/isw-unibe-ch/PMST-KomSaikul
